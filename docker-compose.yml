services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: zta
      POSTGRES_PASSWORD: zta
      POSTGRES_DB: zta_ai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zta -d zta_ai"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  db-init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://zta:zta@postgres:5432/zta_ai
    command: python -m scripts.bootstrap_seed
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://zta:zta@postgres:5432/zta_ai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      db-init:
        condition: service_completed_successfully

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://zta:zta@postgres:5432/zta_ai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=INFO
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      db-init:
        condition: service_completed_successfully

  streamlit:
    build:
      context: ./streamlit_frontend
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
      - "8080:8501"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pg_data: