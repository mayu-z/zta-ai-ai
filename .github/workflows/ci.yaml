name: Backend CI - FastAPI + Celery

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6399:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENV: test
      JWT_SECRET_KEY: test-secret
      DATABASE_URL: sqlite:///./test_zta.db
      REDIS_URL: redis://localhost:6399/0
      CELERY_BROKER_URL: redis://localhost:6399/1
      CELERY_RESULT_BACKEND: redis://localhost:6399/2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort mypy bandit safety

      - name: Lint with flake8 (critical)
        run: |
          flake8 app/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: Lint with flake8 (style report)
        run: |
          flake8 app/ \
            --max-line-length=88 \
            --exclude=__pycache__ \
            --statistics \
            --exit-zero

      - name: Format check with black (report)
        run: black --check app/ || true

      - name: Import order check with isort (report)
        run: isort --check-only app/ || true

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports

      - name: Run tests
        env:
          CELERY_TASK_ALWAYS_EAGER: "true"
          CELERY_TASK_EAGER_PROPAGATES: "true"
        run: |
          pytest -q tests -p no:cacheprovider

      - name: Smoke test - app boots and /health passes
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 4
          curl --fail http://localhost:8000/health || exit 1
          kill %1

      - name: Bandit - Python security scan
        run: bandit -r app/ -ll

      - name: Safety - dependency CVE check
        run: safety check -r requirements.txt || true

      - name: Trivy - filesystem vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: |
            zta-backend:${{ github.ref_name }}
            zta-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write job summary on success
        if: success()
        run: |
          echo "## CI Passed" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | zta-backend:${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY

      - name: Write job summary on failure
        if: failure()
        run: |
          echo "## CI Failed" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Check logs** | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
