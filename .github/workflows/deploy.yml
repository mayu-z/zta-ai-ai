name: CD Deploy to EC2

on:
  workflow_run:
    workflows:
      - "Backend CI - FastAPI + Celery"
    branches:
      - ec2-main
    types:
      - completed

  workflow_dispatch:

jobs:
  deploy:
    if: |
     github.event_name == 'workflow_dispatch' ||
     (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'ec2-main'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Deploy latest ec2-main to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ~/ZTA-AI
            git pull origin ec2-main
            docker-compose down
            docker-compose up --build -d

      - name: Health check after deploy
        run: |
          set -euo pipefail
          sleep 20

          backend_response="$(curl -fsS http://3.25.225.250:8000/health || true)"
          if [[ -z "$backend_response" ]]; then
            echo "::error::Backend health endpoint is unreachable."
            exit 1
          fi
          if ! echo "$backend_response" | grep -q '"status":"ok"'; then
            echo "::error::Backend health check failed. Response: $backend_response"
            exit 1
          fi

          frontend_code="$(curl -sS -o /dev/null -w "%{http_code}" http://3.25.225.250:8080 || true)"
          if [[ "$frontend_code" != "200" ]]; then
            echo "::error::Frontend health check failed. Expected HTTP 200, got $frontend_code"
            exit 1
          fi

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ~/ZTA-AI
            git checkout HEAD~1
            docker-compose up --build -d

      - name: Mark deployment failure clearly
        if: failure()
        run: |
          echo "::error::Deployment health checks failed. Rollback executed on EC2."
          exit 1

      - name: Write deployment summary
        if: success()
        run: |
          timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "## CD Deployment Succeeded" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit SHA | ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Timestamp (UTC) | $timestamp |" >> "$GITHUB_STEP_SUMMARY"