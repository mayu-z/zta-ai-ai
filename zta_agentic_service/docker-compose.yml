services:
  api:
    build:
      context: .
    environment:
      APP_NAME: zta-agentic-service
      ENVIRONMENT: docker
      SEED_TENANT_ID: 00000000-0000-0000-0000-000000000001
      DATABASE_URL: postgresql+psycopg://zta:zta@postgres:5432/zta_agentic
      REDIS_URL: redis://redis:6379/0
      BROKER_URL: redis://redis:6379/1
      LLM_PROVIDER: stub
      LLM_MODEL: intent-stub
      INTENT_AUTO_SELECT_THRESHOLD: 0.82
      INTENT_CLARIFICATION_THRESHOLD: 0.65
      INTENT_MARGIN_THRESHOLD: 0.08
      MAX_CHAIN_DEPTH: 3
      TOKENIZATION_SECRET_KEY: docker-dev-secret-change-me
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["sh", "-c", "python -m app.db.init_db && alembic upgrade head && PYTHONPATH=/app python scripts/seed_agent_templates.py --tenant-id $${SEED_TENANT_ID:-00000000-0000-0000-0000-000000000001} && exec uvicorn app.main:app --host 0.0.0.0 --port 8000"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zta_agentic
      POSTGRES_USER: zta
      POSTGRES_PASSWORD: zta
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zta -d zta_agentic"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    expose:
      - "6379"