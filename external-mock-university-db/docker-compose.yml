services:
  university-postgres:
    image: postgres:15
    container_name: university-postgres
    environment:
      POSTGRES_DB: university_mock
      POSTGRES_USER: university
      POSTGRES_PASSWORD: university
    ports:
      - "55432:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
      - university_mock_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U university -d university_mock"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  university_mock_data:
